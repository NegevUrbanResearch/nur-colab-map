<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nur Colab Map - Variant C Tuned</title>
    <style>
      :root {
        --line: rgba(255, 255, 255, 0.16);
        --glass: rgba(20, 20, 20, 0.52);
        --panel: rgba(24, 24, 28, 0.94);
        --text: rgba(255, 255, 255, 0.95);
        --muted: rgba(255, 255, 255, 0.7);
        --green-a: #39b96b;
        --green-b: #60d58e;
      }
      * { box-sizing: border-box; font-family: Inter, "Noto Sans Hebrew", Arial, sans-serif; }
      body {
        margin: 0;
        background: linear-gradient(160deg, #121824, #0c1015);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 18px;
        color: var(--text);
      }
      .phone {
        width: min(430px, 96vw);
        height: min(880px, 92vh);
        border-radius: 24px;
        border: 1px solid var(--line);
        overflow: hidden;
        position: relative;
      }
      .map {
        position: absolute;
        inset: 0;
        background: linear-gradient(36deg, #2c3943, #4f6777 50%, #2a3943);
      }
      .map::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(0,0,0,.12), rgba(0,0,0,.35));
      }
      .top {
        position: absolute;
        top: 10px;
        right: 10px;
        left: 10px;
        z-index: 4;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--glass);
        backdrop-filter: blur(12px);
        padding: 8px;
        font-size: 12px;
      }

      .stack {
        position: absolute;
        right: 10px;
        left: 10px;
        bottom: 10px;
        z-index: 7;
        display: grid;
        grid-template-rows: auto auto auto;
        gap: 0;
      }

      .legend-tray {
        display: none;
        border: 1px solid var(--line);
        border-radius: 10px 10px 0 0;
        border-bottom: 0;
        background: var(--glass);
        backdrop-filter: blur(12px);
        padding: 6px 8px;
        max-height: 150px;
        overflow: auto;
      }
      .legend-tray.open { display: block; }
      .legend-group {
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 8px;
        padding: 6px 8px;
        margin-top: 5px;
      }
      .legend-item {
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
      }
      .sw { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-left: 7px; }

      .inline-strip {
        border: 1px solid var(--line);
        border-radius: 10px 10px 0 0;
        border-bottom: 0;
        background: var(--glass);
        backdrop-filter: blur(12px);
        padding: 6px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
      }
      .inline-strip button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255,255,255,.1);
        color: var(--text);
        padding: 8px 6px;
        font-size: 11px;
        min-height: 36px;
      }

      .toolbar {
        border: 1px solid var(--line);
        border-radius: 0 0 12px 12px;
        background: var(--glass);
        backdrop-filter: blur(12px);
        padding: 8px;
        display: grid;
        grid-template-columns: 88px 1fr 88px;
        gap: 8px;
      }
      .rail { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
      .rail button {
        width: 100%;
        border: 0;
        border-bottom: 1px solid rgba(255,255,255,.12);
        background: rgba(255,255,255,.06);
        color: var(--text);
        padding: 8px 6px;
        font-size: 11px;
      }
      .rail button:last-child { border-bottom: 0; }
      .main { border: 1px solid var(--line); border-radius: 10px; padding: 10px; text-align: right; }
      .main-title { font-size: 13px; }
      .main-sub { margin-top: 3px; font-size: 12px; color: var(--muted); }

      .sheet {
        position: absolute;
        right: 0;
        left: 0;
        bottom: 0;
        height: 68%;
        background: var(--panel);
        border-top: 1px solid var(--line);
        border-radius: 18px 18px 0 0;
        transform: translateY(102%);
        transition: transform .24s ease;
        z-index: 10;
        display: grid;
        grid-template-rows: auto auto 1fr;
      }
      .sheet.open { transform: translateY(0); }
      .sheet-head {
        padding: 10px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,.12);
      }

      .pack-strip-wrap { padding: 8px 12px 6px; }
      .pack-strip {
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: none;
      }
      .pack-strip::-webkit-scrollbar { display: none; }
      .pack-row { display: flex; gap: 6px; width: max-content; }
      .pack-chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255,255,255,.1);
        color: var(--text);
        padding: 4px 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .pack-chip.active { background: rgba(255,255,255,.24); }
      .pack-chip-label { font-size: 12px; white-space: nowrap; }
      .pack-toggle {
        width: 30px;
        height: 18px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,.12);
        position: relative;
        cursor: pointer;
      }
      .pack-toggle::after {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
        position: absolute;
        top: 2px;
        right: 2px;
      }
      .pack-toggle.on {
        background: linear-gradient(135deg, var(--green-a), var(--green-b));
      }
      .pack-toggle.on::after { right: 14px; }

      .sheet-body { overflow: auto; padding: 0 12px 10px; }
      .tile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
      .layer-tile {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255,255,255,.08);
        color: var(--text);
        padding: 9px 8px;
        text-align: right;
        cursor: pointer;
        position: relative;
      }
      .layer-tile::before {
        content: "";
        position: absolute;
        left: 8px;
        top: 8px;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        border: 1px solid rgba(255,255,255,.36);
        background: transparent;
      }
      .layer-tile.is-on {
        background: rgba(255,255,255,.2);
        border-color: rgba(255,255,255,.28);
      }
      .layer-tile.is-on::before {
        background: linear-gradient(135deg, var(--green-a), var(--green-b));
        border-color: transparent;
      }
      .layer-title {
        font-size: 12px;
        padding-left: 16px;
      }
    </style>
  </head>
  <body>
    <main class="phone">
      <div class="map"></div>
      <section class="top">
        base-map-controls (current) נשארים ללא שינוי
        <div style="margin-top:3px;color:var(--muted);font-size:11px">Variant C tuned: strip inline + single basemap button + compact sheet</div>
      </section>

      <section class="stack">
        <div class="legend-tray" id="legendTray">
          <strong style="font-size:12px">מקרא חבילות פעילות</strong>
          <div id="legendBody"></div>
        </div>
        <div class="inline-strip">
          <button id="openSheet">שכבות (0)</button>
          <button id="toggleLegend">מקרא</button>
          <button id="toggleBase">בסיס: לוויין</button>
        </div>
        <div class="toolbar">
          <div class="rail"><button>הגשה</button><button>נקה הכל</button></div>
          <div class="main"><div class="main-title">לחץ על המפה כדי להוסיף נקודות</div><div class="main-sub">14 נקודות</div></div>
          <div class="rail"><button>בטל</button><button>בצע שוב</button></div>
        </div>
      </section>

      <section class="sheet" id="sheet">
        <div class="sheet-head">
          <strong>שכבות</strong>
          <button id="closeSheet">סגור</button>
        </div>
        <div class="pack-strip-wrap">
          <div class="pack-strip">
            <div class="pack-row" id="packRow"></div>
          </div>
        </div>
        <div class="sheet-body">
          <div class="tile-grid" id="tileGrid"></div>
        </div>
      </section>
    </main>

    <script>
      const packs = {
        greens: {
          label: "ירוקים",
          enabled: true,
          layers: [
            { id: "gan", label: "גן לאומי", on: true, color: "#42b56d" },
            { id: "res", label: "שמורות טבע", on: true, color: "#2f9d5d" },
            { id: "riv", label: "נחלים", on: false, color: "#4ea0ff" }
          ]
        },
        future: {
          label: "עתידי",
          enabled: true,
          layers: [
            { id: "park", label: "חניה", on: true, color: "#f3a429" },
            { id: "axis", label: "ציר 232", on: true, color: "#ff69b4" },
            { id: "mur", label: "מוקדי מורשת", on: true, color: "#af78ff" },
            { id: "imp", label: "מימושים", on: false, color: "#f46d6d" }
          ]
        },
        oct7: {
          label: "7.10",
          enabled: false,
          layers: [
            { id: "entry", label: "חדירה לישוב", on: false, color: "#ffd05a" },
            { id: "fight", label: "מאבק וגבורה", on: false, color: "#ff8b5e" },
            { id: "hit", label: "פגיעה נקודתית", on: false, color: "#ff6d7f" }
          ]
        }
      };

      let focusedPack = "greens";
      let basemap = "satellite";

      const openSheet = document.getElementById("openSheet");
      const closeSheet = document.getElementById("closeSheet");
      const sheet = document.getElementById("sheet");
      const toggleLegend = document.getElementById("toggleLegend");
      const legendTray = document.getElementById("legendTray");
      const legendBody = document.getElementById("legendBody");
      const toggleBase = document.getElementById("toggleBase");
      const packRow = document.getElementById("packRow");
      const tileGrid = document.getElementById("tileGrid");

      const totalOn = () => Object.keys(packs).reduce((sum, k) => sum + packs[k].layers.filter((l) => l.on).length, 0);

      function refreshLegend() {
        legendBody.innerHTML = "";
        Object.keys(packs).forEach((key) => {
          const active = packs[key].layers.filter((l) => l.on);
          if (!active.length) return;
          const group = document.createElement("div");
          group.className = "legend-group";
          group.innerHTML = `<div style="font-size:12px">${packs[key].label}</div>`;
          active.forEach((layer) => {
            const item = document.createElement("div");
            item.className = "legend-item";
            item.innerHTML = `<i class="sw" style="background:${layer.color}"></i>${layer.label}`;
            group.appendChild(item);
          });
          legendBody.appendChild(group);
        });
        if (!legendBody.children.length) {
          legendBody.innerHTML = `<div class="legend-group"><div class="legend-item">אין שכבות פעילות</div></div>`;
        }
      }

      function renderPackRow() {
        packRow.innerHTML = "";
        Object.keys(packs).forEach((key) => {
          const chip = document.createElement("div");
          chip.className = `pack-chip ${focusedPack === key ? "active" : ""}`.trim();
          chip.innerHTML = `
            <button class="pack-toggle ${packs[key].enabled ? "on" : ""}" data-pack="${key}" title="הפעל/כבה חבילה"></button>
            <button class="pack-chip-label" data-select="${key}">${packs[key].label}</button>
          `;
          packRow.appendChild(chip);
        });

        packRow.querySelectorAll("[data-select]").forEach((btn) => {
          btn.addEventListener("click", () => {
            focusedPack = btn.getAttribute("data-select");
            renderAll();
          });
        });

        packRow.querySelectorAll("[data-pack]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const key = btn.getAttribute("data-pack");
            packs[key].enabled = !packs[key].enabled;
            packs[key].layers.forEach((layer) => { layer.on = packs[key].enabled; });
            if (focusedPack === key) renderTiles();
            renderAll();
          });
        });
      }

      function renderTiles() {
        tileGrid.innerHTML = "";
        packs[focusedPack].layers.forEach((layer) => {
          const tile = document.createElement("button");
          tile.className = `layer-tile ${layer.on ? "is-on" : ""}`.trim();
          tile.innerHTML = `<div class="layer-title">${layer.label}</div>`;
          tile.addEventListener("click", () => {
            layer.on = !layer.on;
            packs[focusedPack].enabled = packs[focusedPack].layers.some((l) => l.on);
            renderAll();
          });
          tileGrid.appendChild(tile);
        });
      }

      function renderAll() {
        openSheet.textContent = `שכבות (${totalOn()})`;
        renderPackRow();
        renderTiles();
        refreshLegend();
      }

      toggleLegend.onclick = () => legendTray.classList.toggle("open");
      openSheet.onclick = () => sheet.classList.add("open");
      closeSheet.onclick = () => sheet.classList.remove("open");
      toggleBase.onclick = () => {
        basemap = basemap === "satellite" ? "osm" : "satellite";
        toggleBase.textContent = basemap === "satellite" ? "בסיס: לוויין" : "בסיס: OSM";
      };

      renderAll();
    </script>
  </body>
</html>
